name: Fetch Daily Brief from Notion

on:
  schedule:
    # Runs daily at 10pm ET (2am UTC next day — after the brief is published at ~4pm ET)
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Fetch Daily Brief
        run: node scripts/fetch-daily-brief.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Check for new brief
        id: changes
        run: |
          git diff --quiet src/content/daily-brief/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Daily Brief Bot"
          git config user.email "actions@github.com"
          git add src/content/daily-brief/
          git commit -m "chore: daily brief $(date -u +%Y-%m-%d)"
          git push
